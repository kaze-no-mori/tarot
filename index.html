
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>風の杜 タロット</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600&family=Shippori+Mincho:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #2c2416;
    --parchment: #f5f0e8;
    --sage: #7a8c6e;
    --gold: #b8965a;
    --gold-light: #d4b07a;
    --cream: #ede8dc;
    --mist: #c8cfc0;
    --deep: #1a1a12;
    --card-back: #3d4a35;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--parchment);
    color: var(--ink);
    font-family: 'Noto Serif JP', serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(ellipse at 20% 10%, rgba(184,150,90,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 90%, rgba(122,140,110,0.08) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }
  .container {
    max-width: 480px;
    margin: 0 auto;
    padding: 0 20px;
    position: relative;
    z-index: 1;
  }
  header {
    text-align: center;
    padding: 40px 0 24px;
  }
  .brand {
    font-family: 'Shippori Mincho', serif;
    font-size: 13px;
    letter-spacing: 0.4em;
    color: var(--gold);
    margin-bottom: 8px;
  }
  .title {
    font-family: 'Shippori Mincho', serif;
    font-size: 26px;
    font-weight: 600;
    letter-spacing: 0.2em;
    color: var(--ink);
    line-height: 1.4;
  }
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 16px 0;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--gold), transparent);
  }
  .divider span { color: var(--gold); font-size: 14px; }
  .subtitle {
    font-size: 13px;
    color: #4a5e40;
    letter-spacing: 0.15em;
    line-height: 1.8;
  }
  #screen-shuffle { padding: 20px 0 40px; }
  .shuffle-area {
    background: var(--cream);
    border: 1px solid rgba(184,150,90,0.3);
    border-radius: 4px;
    padding: 32px 20px;
    text-align: center;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
  }
  .shuffle-area::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(45deg,transparent,transparent 20px,rgba(184,150,90,0.03) 20px,rgba(184,150,90,0.03) 21px);
  }
  .deck-visual {
    position: relative;
    width: 100px;
    height: 140px;
    margin: 0 auto 24px;
    cursor: pointer;
  }
  .deck-card {
    position: absolute;
    width: 90px;
    height: 130px;
    background: var(--card-back);
    border-radius: 6px;
    border: 2px solid var(--gold);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.3s ease;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  .deck-card::after { content: '✦'; color: var(--gold); font-size: 20px; opacity: 0.6; }
  .deck-card:nth-child(1) { transform: translate(-4px,-4px) rotate(-3deg); }
  .deck-card:nth-child(2) { transform: translate(-2px,-2px) rotate(-1deg); }
  .deck-card:nth-child(3) { transform: translate(0,0); }
  .deck-card:nth-child(4) { transform: translate(2px,2px) rotate(1deg); }
  .deck-card:nth-child(5) { transform: translate(4px,4px) rotate(3deg); }
  .deck-visual:hover .deck-card:nth-child(1) { transform: translate(-12px,-8px) rotate(-6deg); }
  .deck-visual:hover .deck-card:nth-child(2) { transform: translate(-6px,-4px) rotate(-3deg); }
  .deck-visual:hover .deck-card:nth-child(3) { transform: translate(0,0); }
  .deck-visual:hover .deck-card:nth-child(4) { transform: translate(6px,4px) rotate(3deg); }
  .deck-visual:hover .deck-card:nth-child(5) { transform: translate(12px,8px) rotate(6deg); }
  .deck-visual.shuffling .deck-card { animation: shuffle-anim 0.6s ease-in-out infinite alternate; }
  .deck-visual.shuffling .deck-card:nth-child(1) { animation-delay: 0s; }
  .deck-visual.shuffling .deck-card:nth-child(2) { animation-delay: 0.1s; }
  .deck-visual.shuffling .deck-card:nth-child(3) { animation-delay: 0.2s; }
  .deck-visual.shuffling .deck-card:nth-child(4) { animation-delay: 0.3s; }
  .deck-visual.shuffling .deck-card:nth-child(5) { animation-delay: 0.4s; }
  @keyframes shuffle-anim {
    0% { transform: translateX(-15px) rotate(-5deg); }
    100% { transform: translateX(15px) rotate(5deg); }
  }
  .shuffle-instruction {
    font-size: 13px;
    color: #4a5e40;
    letter-spacing: 0.1em;
    line-height: 1.8;
    position: relative;
    z-index: 1;
    margin-bottom: 8px;
  }
  .shuffle-btn {
    background: none;
    border: 1px solid var(--gold);
    color: var(--gold);
    padding: 12px 32px;
    font-family: 'Shippori Mincho', serif;
    font-size: 14px;
    letter-spacing: 0.3em;
    cursor: pointer;
    transition: all 0.3s ease;
    margin-top: 16px;
    position: relative;
    z-index: 1;
  }
  .shuffle-btn:hover { background: var(--gold); color: var(--parchment); }
  .shuffle-btn:disabled { opacity: 0.5; cursor: default; }
  #screen-spread { padding: 20px 0 40px; display: none; }
  .spread-instruction {
    text-align: center;
    font-size: 13px;
    color: #4a5e40;
    letter-spacing: 0.1em;
    margin-bottom: 24px;
    line-height: 1.8;
  }
  .cards-fan {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    padding: 20px 0;
  }
  .fan-card {
    width: 52px;
    height: 80px;
    background: var(--card-back);
    border-radius: 4px;
    border: 1px solid var(--gold);
    cursor: pointer;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.25s ease, box-shadow 0.25s ease;
    flex-shrink: 0;
  }
  .fan-card::after { content: '✦'; color: var(--gold); font-size: 10px; opacity: 0.5; }
  .fan-card:hover { transform: translateY(-8px) scale(1.05); box-shadow: 0 8px 20px rgba(0,0,0,0.3); border-color: var(--gold-light); }
  .fan-card.selected { opacity: 0.3; pointer-events: none; transform: none; }
  #screen-result { padding: 20px 0 40px; display: none; }
  .result-card-area { text-align: center; margin-bottom: 32px; }
  .result-card-wrap { display: inline-block; perspective: 800px; margin-bottom: 20px; }
  .result-card-inner {
    width: 160px;
    height: 240px;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.8s ease;
  }
  .result-card-inner.flipped { transform: rotateY(180deg); }
  .result-card-inner.reversed-card { transform: rotateY(180deg) rotate(180deg); }
  .result-card-front, .result-card-back {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }
  .result-card-back {
    background: var(--card-back);
    border: 2px solid var(--gold);
  }
  .result-card-back::after { content: '✦'; color: var(--gold); font-size: 32px; opacity: 0.6; }
  .result-card-front {
    background: var(--cream);
    border: 2px solid var(--gold);
    transform: rotateY(180deg);
    flex-direction: column;
    gap: 0;
    overflow: hidden;
    padding: 12px 8px;
  }
  .card-symbol { font-size: 48px; line-height: 1; margin-bottom: 8px; }
  .card-roman { font-size: 10px; letter-spacing: 0.3em; color: var(--gold); font-family: 'Shippori Mincho', serif; }
  .card-name-ja { font-family: 'Shippori Mincho', serif; font-size: 14px; font-weight: 600; letter-spacing: 0.15em; color: var(--ink); margin-top: 4px; }
  .card-name-en { font-size: 9px; color: var(--sage); letter-spacing: 0.2em; margin-top: 2px; }
  .reversed-label { font-size: 9px; color: #c0392b; letter-spacing: 0.2em; margin-top: 4px; font-family: 'Shippori Mincho', serif; }
  .card-reading {
    background: var(--cream);
    border: 1px solid rgba(184,150,90,0.3);
    padding: 24px 20px;
    position: relative;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.6s ease 0.9s;
  }
  .card-reading.visible { opacity: 1; transform: translateY(0); }
  .reading-label { font-size: 10px; letter-spacing: 0.4em; color: var(--gold); margin-bottom: 12px; font-family: 'Shippori Mincho', serif; }
  .reading-keyword { font-family: 'Shippori Mincho', serif; font-size: 16px; font-weight: 600; color: var(--ink); letter-spacing: 0.2em; margin-bottom: 16px; line-height: 1.6; }
  .reading-text { font-size: 13px; line-height: 2; color: #1e1a14; border-top: 1px solid rgba(184,150,90,0.2); padding-top: 14px; }
  .reading-advice { margin-top: 14px; padding: 12px; background: rgba(122,140,110,0.1); font-size: 12px; line-height: 1.9; color: #3d5032; font-style: italic; letter-spacing: 0.05em; }
  .again-btn {
    display: block;
    width: 100%;
    background: none;
    border: 1px solid var(--ink);
    color: var(--ink);
    padding: 14px;
    font-family: 'Shippori Mincho', serif;
    font-size: 13px;
    letter-spacing: 0.3em;
    cursor: pointer;
    transition: all 0.4s ease 1.6s;
    margin-top: 24px;
    opacity: 0;
  }
  .again-btn.visible { opacity: 1; }
  .again-btn:hover { background: var(--ink); color: var(--parchment); }
  .ornament { text-align: center; color: var(--gold); font-size: 18px; opacity: 0.4; margin: 8px 0; letter-spacing: 8px; }
  .fade-in { animation: fadeIn 0.6s ease forwards; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  .shuffled-msg { font-size: 12px; color: var(--gold); letter-spacing: 0.2em; text-align: center; margin-top: 8px; height: 20px; }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="brand">風の杜 ✦ kaze no mori</div>
    <h1 class="title">今日の一枚</h1>
    <div class="divider"><span>✦</span></div>
    <p class="subtitle">静かに心を整え<br>カードに問いかけてください</p>
  </header>

  <div id="screen-shuffle">
    <div class="shuffle-area">
      <div class="deck-visual" id="deckVisual" onclick="startShuffle()">
        <div class="deck-card"></div>
        <div class="deck-card"></div>
        <div class="deck-card"></div>
        <div class="deck-card"></div>
        <div class="deck-card"></div>
      </div>
      <p class="shuffle-instruction">今日、あなたに伝えたいことは何ですか<br>デッキに手を触れて、問いを胸に抱いてください</p>
      <button class="shuffle-btn" id="shuffleBtn" onclick="startShuffle()">カードをシャッフルする</button>
      <p class="shuffled-msg" id="shuffledMsg"></p>
    </div>
    <div class="ornament">✦ · · ✦</div>
  </div>

  <div id="screen-spread">
    <p class="spread-instruction">
      カードが広がりました<br>
      <span style="font-size:12px; color:var(--gold);">直感で一枚、手を伸ばしてください</span>
    </p>
    <div class="cards-fan" id="cardsFan"></div>
  </div>

  <div id="screen-result">
    <div class="result-card-area">
      <div class="result-card-wrap">
        <div class="result-card-inner" id="resultCardInner">
          <div class="result-card-back"></div>
          <div class="result-card-front" id="resultCardFront"></div>
        </div>
      </div>
    </div>
    <div class="card-reading" id="cardReading">
      <div class="reading-label" id="readingLabel">✦ TODAY'S READING ✦</div>
      <div id="reversedBadge" style="margin-bottom:8px;"></div>
      <div class="reading-keyword" id="readingKeyword"></div>
      <div class="reading-text" id="readingText"></div>
      <div class="reading-advice" id="readingAdvice"></div>
    </div>
    <button class="again-btn" id="againBtn" onclick="resetAll()">もう一度 引き直す</button>
  </div>
</div>

<script>
const TAROT = [
  // ── 大アルカナ 正位置 ──
  {id:0,roman:"0",nameJa:"愚者",nameEn:"THE FOOL",symbol:"🌬️",reversed:false,
   keyword:"新しい始まり・無限の可能性・自由な一歩",
   text:"恐れを手放して、新しい旅へと踏み出すときです。経験がないことを不安に思わなくていい。白紙のような純粋さが、あなたの最大の強みです。直感を信じて、軽やかに一歩を踏み出してください。",
   advice:"「知らないこと」は弱さではありません。まっさらな心が、最良の出会いを引き寄せます。"},
  {id:1,roman:"I",nameJa:"魔術師",nameEn:"THE MAGICIAN",symbol:"✨",reversed:false,
   keyword:"意志・創造力・行動する力",
   text:"必要な力とツールはすでにあなたの手の中にあります。今こそ意志を定め、集中して行動する時。思考・感情・行動が一致したとき、願いは現実へと変わります。",
   advice:"意図を明確に持つこと。それだけで世界はあなたに応えはじめます。"},
  {id:2,roman:"II",nameJa:"女教皇",nameEn:"THE HIGH PRIESTESS",symbol:"🌙",reversed:false,
   keyword:"直感・内なる知恵・静けさ",
   text:"今日は外に答えを求めるより、内側の声に耳を傾けてください。感じていること、夢に見たこと、ふとよぎった直感を大切にして。論理より感覚が正しい答えを持っている日です。",
   advice:"月明かりの中にこそ、見えてくるものがあります。静かに、待ってみてください。"},
  {id:3,roman:"III",nameJa:"女帝",nameEn:"THE EMPRESS",symbol:"🌸",reversed:false,
   keyword:"豊かさ・育む力・感性と創造",
   text:"今日は五感を大切にしてください。美しいものを見て、美味しいものを食べ、心地よい場所に身を置く。その豊かさの中に、新しいアイデアや縁が芽吹いています。自分を慈しむことが、周囲への愛にもなります。",
   advice:"大地が花を咲かせるように、あなたの優しさが実を結ぶ季節です。"},
  {id:4,roman:"IV",nameJa:"皇帝",nameEn:"THE EMPEROR",symbol:"🏔️",reversed:false,
   keyword:"安定・秩序・リーダーシップ",
   text:"今日は「決める」ことを恐れないでください。計画を立て、責任を持って行動する日。感情より構造と論理を優先させることで、長期的な安定が生まれます。",
   advice:"山は揺れません。あなたの芯の強さが、周囲に安心を与えます。"},
  {id:5,roman:"V",nameJa:"教皇",nameEn:"THE HIEROPHANT",symbol:"🕊️",reversed:false,
   keyword:"伝統・教え・精神的なつながり",
   text:"今日は先人の知恵や伝統の中に、大切なヒントが隠れています。師匠、導き手、長年続いてきた習慣に目を向けてみてください。慣習に従うことが、今は最善の道かもしれません。",
   advice:"受け継がれてきたものの中に、時代を超えた真実があります。"},
  {id:6,roman:"VI",nameJa:"恋人たち",nameEn:"THE LOVERS",symbol:"🌿",reversed:false,
   keyword:"選択・調和・誠実な愛",
   text:"今日は「本当に望んでいること」を問い直す日。誰かのためではなく、自分の心に正直な選択をしてください。愛と価値観に基づいた決断が、最も豊かな結果を生みます。",
   advice:"恐れではなく、愛から選ぶこと。その一つの違いが、人生を変えます。"},
  {id:7,roman:"VII",nameJa:"戦車",nameEn:"THE CHARIOT",symbol:"⚡",reversed:false,
   keyword:"意志・勝利・克服",
   text:"困難があっても、意志の力で突き進む日です。感情という相反する力を御しながら、目標に向かって前進してください。迷いを脇に置いて、一点集中で動くことが吉です。",
   advice:"手綱を握るのはあなた自身。感情を制した先に、勝利があります。"},
  {id:8,roman:"VIII",nameJa:"力",nameEn:"STRENGTH",symbol:"🦁",reversed:false,
   keyword:"内なる強さ・優しさ・忍耐",
   text:"今日必要な強さは、静かで深いもの。怒りや恐れを押さえ込むのではなく、優しく受け入れることが本当の力になります。柔らかさの中にこそ、折れない芯があります。",
   advice:"あなたはもう十分に強い。その強さを、自分自身へも向けてあげてください。"},
  {id:9,roman:"IX",nameJa:"隠者",nameEn:"THE HERMIT",symbol:"🏮",reversed:false,
   keyword:"内省・探求・独り時間",
   text:"今日は一人の時間を大切にしてください。賑やかさから離れて、自分の内側を丁寧に見つめることで、大切な気づきが訪れます。孤独は弱さではなく、成熟への道です。",
   advice:"灯籠は自分を照らしながら、道を照らします。あなたの探求が、周囲の光にもなります。"},
  {id:10,roman:"X",nameJa:"運命の輪",nameEn:"WHEEL OF FORTUNE",symbol:"☸️",reversed:false,
   keyword:"転換・流れ・チャンスの到来",
   text:"物事が大きく動き始めています。この流れに乗ることを意識してください。コントロールしようとし過ぎず、変化を恐れずに受け入れることで、思わぬ好機が開きます。",
   advice:"輪は必ず回ります。今どの位置にいても、それは次の場所への途中です。"},
  {id:11,roman:"XI",nameJa:"正義",nameEn:"JUSTICE",symbol:"⚖️",reversed:false,
   keyword:"公正・誠実・因果応報",
   text:"今日は正直に、フェアに。蒔いた種は必ず刈り取る時が来ます。今の誠実な行動が、未来の公正な結果につながります。感情より、原則と事実に基づいた判断を。",
   advice:"天秤はどちらかを切り捨てません。両方を丁寧に見ることが、真の判断です。"},
  {id:12,roman:"XII",nameJa:"吊るされた男",nameEn:"THE HANGED MAN",symbol:"🌊",reversed:false,
   keyword:"視点の転換・手放す・待機",
   text:"今日は「逆さまから見る」練習をしてみてください。当たり前だと思っていたことを疑い、違う角度から物事を眺めると、思わぬ発見があります。今は動かず待つことが、最善の行動です。",
   advice:"手放すことは、失うことではありません。空いた手に、新しいものが届きます。"},
  {id:13,roman:"XIII",nameJa:"死神",nameEn:"DEATH",symbol:"🍂",reversed:false,
   keyword:"終わりと始まり・変容・手放し",
   text:"何かが終わろうとしているなら、それを引き止めないでください。終わりは必ず新しい始まりへとつながっています。古いものを手放すことで、本当に必要なものが見えてきます。",
   advice:"秋が葉を落とすのは、春の準備です。あなたにも、そんな季節が来ています。"},
  {id:14,roman:"XIV",nameJa:"節制",nameEn:"TEMPERANCE",symbol:"🌿",reversed:false,
   keyword:"調和・バランス・癒し",
   text:"今日は「ちょうどよさ」を意識してください。急ぎすぎず、止まりすぎず。異なるものを混ぜ合わせ、中庸を保つことで、新しい何かが生まれます。心と体のバランスを整える日です。",
   advice:"水は器に従いながら、常に流れ続けます。あなたの柔軟さが、調和を生みます。"},
  {id:15,roman:"XV",nameJa:"悪魔",nameEn:"THE DEVIL",symbol:"🔗",reversed:false,
   keyword:"束縛・執着・影の自己",
   text:"今日は「自分を縛っているもの」を正直に見てみてください。恐れ、依存、思い込み。それに気づくことが、解放への第一歩です。鎖は思ったより、緩いかもしれません。",
   advice:"影を見ることを恐れないで。影は光があるから生まれます。あなたには必ず光がある。"},
  {id:16,roman:"XVI",nameJa:"塔",nameEn:"THE TOWER",symbol:"⛈️",reversed:false,
   keyword:"崩壊・解放・突然の変化",
   text:"突然の変化や崩れを感じているなら、それは必要な解体かもしれません。古くなった基盤を崩すことで、より本物の土台が作られます。嵐は必ず過ぎ去ります。",
   advice:"崩れた後の更地にこそ、本当に建てたいものが建てられます。"},
  {id:17,roman:"XVII",nameJa:"星",nameEn:"THE STAR",symbol:"⭐",reversed:false,
   keyword:"希望・癒し・信頼",

let shuffled = false;
let deck = [];

function startShuffle() {
  if (shuffled) { goToSpread(); return; }
  const deckVisual = document.getElementById('deckVisual');
  const btn = document.getElementById('shuffleBtn');
  const msg = document.getElementById('shuffledMsg');
  btn.disabled = true;
  deckVisual.classList.add('shuffling');
  setTimeout(() => {
    deckVisual.classList.remove('shuffling');
    shuffled = true;
    deck = [...TAROT].sort(() => Math.random() - 0.5);
    msg.textContent = '✦ シャッフルされました ✦';
    btn.textContent = 'カードを広げる';
    btn.disabled = false;
  }, 1800);
}

function goToSpread() {
  document.getElementById('screen-shuffle').style.display = 'none';
  const spread = document.getElementById('screen-spread');
  spread.style.display = 'block';
  spread.classList.add('fade-in');
  const fan = document.getElementById('cardsFan');
  fan.innerHTML = '';
  deck.forEach((card) => {
    const el = document.createElement('div');
    el.className = 'fan-card' + (card.reversed ? ' reversed' : '');
    el.textContent = '✦';
    el.addEventListener('click', () => selectCard(card, el));
    fan.appendChild(el);
  });
}

function selectCard(card, el) {
  el.classList.add('selected');
  setTimeout(() => showResult(card), 300);
}

function showResult(card) {
  document.getElementById('screen-spread').style.display = 'none';
  const result = document.getElementById('screen-result');
  result.style.display = 'block';
  result.classList.add('fade-in');
  const inner = document.getElementById('resultCardInner');
  inner.classList.remove('flipped', 'reversed-card');
  document.getElementById('resultCardFront').innerHTML = `
    <div class="card-symbol">${card.symbol}</div>
    <div class="card-roman">${card.roman}</div>
    <div class="card-name-ja">${card.nameJa}</div>
    <div class="card-name-en">${card.nameEn}</div>
    ${card.reversed ? '<div class="reversed-label">逆位置</div>' : ''}
  `;
  document.getElementById('readingLabel').textContent = card.reversed ? '✦ REVERSED READING ✦' : "✦ TODAY'S READING ✦";
  document.getElementById('reversedBadge').innerHTML = card.reversed ? '<span class="reversed-badge">逆位置</span>' : '';
  document.getElementById('readingKeyword').textContent = card.keyword;
  document.getElementById('readingText').textContent = card.text;
  document.getElementById('readingAdvice').textContent = card.advice;
  setTimeout(() => {
    inner.classList.add('flipped');
    if (card.reversed) inner.classList.add('reversed-card');
  }, 400);
  setTimeout(() => { document.getElementById('cardReading').classList.add('visible'); }, 1200);
  setTimeout(() => { document.getElementById('againBtn').classList.add('visible'); }, 1800);
}

function resetAll() {
  shuffled = false; deck = [];
  document.getElementById('screen-result').style.display = 'none';
  document.getElementById('screen-result').classList.remove('fade-in');
  document.getElementById('cardReading').classList.remove('visible');
  document.getElementById('againBtn').classList.remove('visible');
  document.getElementById('resultCardInner').classList.remove('flipped', 'reversed-card');
  document.getElementById('screen-shuffle').style.display = 'block';
  document.getElementById('shuffleBtn').textContent = 'カードをシャッフルする';
  document.getElementById('shuffleBtn').disabled = false;
  document.getElementById('shuffledMsg').textContent = '';
}
</script>
