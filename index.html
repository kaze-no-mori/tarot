<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>風の杜 タロット</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600&family=Shippori+Mincho:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #2c2416;
    --parchment: #f5f0e8;
    --sage: #7a8c6e;
    --gold: #b8965a;
    --gold-light: #d4b07a;
    --cream: #ede8dc;
    --mist: #c8cfc0;
    --deep: #1a1a12;
    --card-back: #3d4a35;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--parchment);
    color: var(--ink);
    font-family: 'Noto Serif JP', serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* 和紙テクスチャ背景 */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(ellipse at 20% 10%, rgba(184,150,90,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 90%, rgba(122,140,110,0.08) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 480px;
    margin: 0 auto;
    padding: 0 20px;
    position: relative;
    z-index: 1;
  }

  /* ヘッダー */
  header {
    text-align: center;
    padding: 40px 0 24px;
  }

  .brand {
    font-family: 'Shippori Mincho', serif;
    font-size: 13px;
    letter-spacing: 0.4em;
    color: var(--gold);
    margin-bottom: 8px;
  }

  .title {
    font-family: 'Shippori Mincho', serif;
    font-size: 26px;
    font-weight: 600;
    letter-spacing: 0.2em;
    color: var(--ink);
    line-height: 1.4;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 16px 0;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--gold), transparent);
  }
  .divider span {
    color: var(--gold);
    font-size: 14px;
  }

  .subtitle {
    font-size: 13px;
    color: #4a5e40;
    letter-spacing: 0.15em;
    line-height: 1.8;
  }

  /* ── SCREEN 1: SHUFFLE ── */
  #screen-shuffle {
    padding: 20px 0 40px;
  }

  .shuffle-area {
    background: var(--cream);
    border: 1px solid rgba(184,150,90,0.3);
    border-radius: 4px;
    padding: 32px 20px;
    text-align: center;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
  }

  .shuffle-area::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      45deg,
      transparent,
      transparent 20px,
      rgba(184,150,90,0.03) 20px,
      rgba(184,150,90,0.03) 21px
    );
  }

  .deck-visual {
    position: relative;
    width: 100px;
    height: 140px;
    margin: 0 auto 24px;
    cursor: pointer;
  }

  .deck-card {
    position: absolute;
    width: 90px;
    height: 130px;
    background: var(--card-back);
    border-radius: 6px;
    border: 2px solid var(--gold);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.3s ease;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }

  .deck-card::after {
    content: '✦';
    color: var(--gold);
    font-size: 20px;
    opacity: 0.6;
  }

  .deck-card:nth-child(1) { transform: translate(-4px, -4px) rotate(-3deg); }
  .deck-card:nth-child(2) { transform: translate(-2px, -2px) rotate(-1deg); }
  .deck-card:nth-child(3) { transform: translate(0, 0); }
  .deck-card:nth-child(4) { transform: translate(2px, 2px) rotate(1deg); }
  .deck-card:nth-child(5) { transform: translate(4px, 4px) rotate(3deg); }

  .deck-visual:hover .deck-card:nth-child(1) { transform: translate(-12px, -8px) rotate(-6deg); }
  .deck-visual:hover .deck-card:nth-child(2) { transform: translate(-6px, -4px) rotate(-3deg); }
  .deck-visual:hover .deck-card:nth-child(3) { transform: translate(0, 0); }
  .deck-visual:hover .deck-card:nth-child(4) { transform: translate(6px, 4px) rotate(3deg); }
  .deck-visual:hover .deck-card:nth-child(5) { transform: translate(12px, 8px) rotate(6deg); }

  .deck-visual.shuffling .deck-card {
    animation: shuffle-anim 0.6s ease-in-out infinite alternate;
  }
  .deck-visual.shuffling .deck-card:nth-child(1) { animation-delay: 0s; }
  .deck-visual.shuffling .deck-card:nth-child(2) { animation-delay: 0.1s; }
  .deck-visual.shuffling .deck-card:nth-child(3) { animation-delay: 0.2s; }
  .deck-visual.shuffling .deck-card:nth-child(4) { animation-delay: 0.3s; }
  .deck-visual.shuffling .deck-card:nth-child(5) { animation-delay: 0.4s; }

  @keyframes shuffle-anim {
    0% { transform: translateX(-15px) rotate(-5deg); }
    100% { transform: translateX(15px) rotate(5deg); }
  }

  .shuffle-instruction {
    font-size: 13px;
    color: #4a5e40;
    letter-spacing: 0.1em;
    line-height: 1.8;
    position: relative;
    z-index: 1;
    margin-bottom: 8px;
  }

  .shuffle-btn {
    background: none;
    border: 1px solid var(--gold);
    color: var(--gold);
    padding: 12px 32px;
    font-family: 'Shippori Mincho', serif;
    font-size: 14px;
    letter-spacing: 0.3em;
    cursor: pointer;
    transition: all 0.3s ease;
    margin-top: 16px;
    position: relative;
    z-index: 1;
  }

  .shuffle-btn:hover {
    background: var(--gold);
    color: var(--parchment);
  }

  .shuffle-btn:disabled {
    opacity: 0.5;
    cursor: default;
  }

  /* ── SCREEN 2: SPREAD ── */
  #screen-spread {
    padding: 20px 0 40px;
    display: none;
  }

  .spread-instruction {
    text-align: center;
    font-size: 13px;
    color: #4a5e40;
    letter-spacing: 0.1em;
    margin-bottom: 24px;
    line-height: 1.8;
  }

  .cards-fan {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    padding: 20px 0;
  }

  .fan-card {
    width: 52px;
    height: 80px;
    background: var(--card-back);
    border-radius: 4px;
    border: 1px solid var(--gold);
    cursor: pointer;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.25s ease, box-shadow 0.25s ease;
    flex-shrink: 0;
  }

  .fan-card::after {
    content: '✦';
    color: var(--gold);
    font-size: 10px;
    opacity: 0.5;
  }

  .fan-card:hover {
    transform: translateY(-8px) scale(1.05);
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    border-color: var(--gold-light);
  }

  .fan-card.selected {
    opacity: 0.3;
    pointer-events: none;
    transform: none;
  }

  /* ── SCREEN 3: RESULT ── */
  #screen-result {
    padding: 20px 0 40px;
    display: none;
  }

  .result-card-area {
    text-align: center;
    margin-bottom: 32px;
  }

  .result-card-wrap {
    display: inline-block;
    perspective: 800px;
    margin-bottom: 20px;
  }

  .result-card-inner {
    width: 160px;
    height: 240px;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.8s ease;
  }

  .result-card-inner.flipped {
    transform: rotateY(180deg);
  }

  .result-card-front, .result-card-back {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }

  .result-card-back {
    background: var(--card-back);
    border: 2px solid var(--gold);
  }

  .result-card-back::after {
    content: '✦';
    color: var(--gold);
    font-size: 32px;
    opacity: 0.6;
  }

  .result-card-front {
    background: var(--cream);
    border: 2px solid var(--gold);
    transform: rotateY(180deg);
    flex-direction: column;
    gap: 0;
    overflow: hidden;
    padding: 12px 8px;
  }

  .card-symbol {
    font-size: 48px;
    line-height: 1;
    margin-bottom: 8px;
  }

  .card-roman {
    font-size: 10px;
    letter-spacing: 0.3em;
    color: var(--gold);
    font-family: 'Shippori Mincho', serif;
  }

  .card-name-ja {
    font-family: 'Shippori Mincho', serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.15em;
    color: var(--ink);
    margin-top: 4px;
  }

  .card-name-en {
    font-size: 9px;
    color: var(--sage);
    letter-spacing: 0.2em;
    margin-top: 2px;
  }

  /* 解説エリア */
  .card-reading {
    background: var(--cream);
    border: 1px solid rgba(184,150,90,0.3);
    padding: 24px 20px;
    position: relative;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.6s ease 0.9s;
  }

  .card-reading.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .reading-label {
    font-size: 10px;
    letter-spacing: 0.4em;
    color: var(--gold);
    margin-bottom: 12px;
    font-family: 'Shippori Mincho', serif;
  }

  .reading-keyword {
    font-family: 'Shippori Mincho', serif;
    font-size: 16px;
    font-weight: 600;
    color: var(--ink);
    letter-spacing: 0.2em;
    margin-bottom: 16px;
    line-height: 1.6;
  }

  .reading-text {
    font-size: 13px;
    line-height: 2;
    color: #1e1a14;
    border-top: 1px solid rgba(184,150,90,0.2);
    padding-top: 14px;
  }

  .reading-advice {
    margin-top: 14px;
    padding: 12px;
    background: rgba(122,140,110,0.1);
    font-size: 12px;
    line-height: 1.9;
    color: #3d5032;
    font-style: italic;
    letter-spacing: 0.05em;
  }

  .again-btn {
    display: block;
    width: 100%;
    background: none;
    border: 1px solid var(--ink);
    color: var(--ink);
    padding: 14px;
    font-family: 'Shippori Mincho', serif;
    font-size: 13px;
    letter-spacing: 0.3em;
    cursor: pointer;
    transition: all 0.3s ease;
    margin-top: 24px;
    opacity: 0;
    transition: all 0.4s ease 1.6s;
  }

  .again-btn.visible {
    opacity: 1;
  }

  .again-btn:hover {
    background: var(--ink);
    color: var(--parchment);
  }

  /* 装飾 */
  .ornament {
    text-align: center;
    color: var(--gold);
    font-size: 18px;
    opacity: 0.4;
    margin: 8px 0;
    letter-spacing: 8px;
  }

  /* フェードイン */
  .fade-in {
    animation: fadeIn 0.6s ease forwards;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* シャッフル済みメッセージ */
  .shuffled-msg {
    font-size: 12px;
    color: var(--gold);
    letter-spacing: 0.2em;
    text-align: center;
    margin-top: 8px;
    height: 20px;
  }
</style>
</head>
<body>

<div class="container">

  <header>
    <div class="brand">風の杜 ✦ kaze no mori</div>
    <h1 class="title">今日の一枚</h1>
    <div class="divider"><span>✦</span></div>
    <p class="subtitle">静かに心を整え<br>カードに問いかけてください</p>
  </header>

  <!-- SCREEN 1: シャッフル -->
  <div id="screen-shuffle">
    <div class="shuffle-area">
      <div class="deck-visual" id="deckVisual" onclick="startShuffle()">
        <div class="deck-card"></div>
        <div class="deck-card"></div>
        <div class="deck-card"></div>
        <div class="deck-card"></div>
        <div class="deck-card"></div>
      </div>
      <p class="shuffle-instruction">今日、あなたに伝えたいことは何ですか<br>デッキに手を触れて、問いを胸に抱いてください</p>
      <button class="shuffle-btn" id="shuffleBtn" onclick="startShuffle()">カードをシャッフルする</button>
      <p class="shuffled-msg" id="shuffledMsg"></p>
    </div>
    <div class="ornament">✦ · · ✦</div>
  </div>

  <!-- SCREEN 2: カード選択 -->
  <div id="screen-spread">
    <p class="spread-instruction">
      カードが広がりました<br>
      <span style="font-size:12px; color:var(--gold);">直感で一枚、手を伸ばしてください</span>
    </p>
    <div class="cards-fan" id="cardsFan"></div>
  </div>

  <!-- SCREEN 3: 結果 -->
  <div id="screen-result">
    <div class="result-card-area">
      <div class="result-card-wrap">
        <div class="result-card-inner" id="resultCardInner">
          <div class="result-card-back"></div>
          <div class="result-card-front" id="resultCardFront"></div>
        </div>
      </div>
    </div>
    <div class="card-reading" id="cardReading">
      <div class="reading-label">✦ TODAY'S READING ✦</div>
      <div class="reading-keyword" id="readingKeyword"></div>
      <div class="reading-text" id="readingText"></div>
      <div class="reading-advice" id="readingAdvice"></div>
    </div>
    <button class="again-btn" id="againBtn" onclick="resetAll()">もう一度 引き直す</button>
  </div>

</div><!-- /container -->

<script>
const TAROT = [
  {
    id: 0, roman: "0", nameJa: "愚者", nameEn: "THE FOOL",
    symbol: "🌬️",
    keyword: "始まり・無限の可能性・自由な魂",
    text: "何も持たないからこそ、何にでもなれる。今のあなたには、恐れる必要のない純粋な好奇心があります。前例や常識にとらわれず、新しい一歩を踏み出す日。失敗を恐れるより、動くことを大切にしてください。",
    advice: "「知らないこと」は弱さではありません。それは、まっさらな心で出会える喜びです。"
  },
  {
    id: 1, roman: "I", nameJa: "魔術師", nameEn: "THE MAGICIAN",
    symbol: "✨",
    keyword: "意志・創造力・行動する力",
    text: "必要な道具はすでにあなたの手の中にあります。今日は「できない理由」を探すのをやめて、「どうすればできるか」に意識を向けてみてください。意志の力が、現実を動かし始める日です。",
    advice: "集中と意図。この二つが揃えば、あなたの言葉と行動は魔法になります。"
  },
  {
    id: 2, roman: "II", nameJa: "女教皇", nameEn: "THE HIGH PRIESTESS",
    symbol: "🌙",
    keyword: "直感・内なる知恵・静けさ",
    text: "今日は外に答えを求めるより、静かに内側の声に耳を傾けてください。あなたの直感は正しく動いています。感じたことを信じて。焦らず、待つことも大切な選択です。",
    advice: "月は満ち欠けしながら、ずっとそこにいます。あなたの内なる知恵も同じです。"
  },
  {
    id: 3, roman: "III", nameJa: "女帝", nameEn: "THE EMPRESS",
    symbol: "🌸",
    keyword: "豊かさ・育む力・感性",
    text: "今日は五感を大切にしてください。美しいものを見て、美味しいものを食べて、心地よい場所にいる。そんな豊かさの中に、新しいアイデアや縁が育まれています。",
    advice: "種を蒔いた土地は、大切に世話をすれば必ず実を結びます。"
  },
  {
    id: 4, roman: "IV", nameJa: "皇帝", nameEn: "THE EMPEROR",
    symbol: "🏔️",
    keyword: "安定・秩序・リーダーシップ",
    text: "今日は「決める」ことを恐れないでください。曖昧なままにしてきたことに、明確な形を与える日です。責任を持って決断することが、周囲への信頼にもつながります。",
    advice: "山は揺れません。あなたの芯の強さが、周囲に安心を与えます。"
  },
  {
    id: 5, roman: "V", nameJa: "教皇", nameEn: "THE HIEROPHANT",
    symbol: "🕊️",
    keyword: "伝統・教え・つながり",
    text: "今日は「師」や「先人の知恵」に目を向ける日です。本でも、人との会話でも、長年続いてきた習慣の中にも、今のあなたに必要な答えが隠れているかもしれません。",
    advice: "誰かに教えることで、自分の理解が深まることがあります。"
  },
  {
    id: 6, roman: "VI", nameJa: "恋人たち", nameEn: "THE LOVERS",
    symbol: "🌿",
    keyword: "選択・調和・誠実さ",
    text: "今日は「本当に望んでいること」を問い直す日。誰かのためではなく、自分の心に誠実な選択をしてください。二つの道があるなら、恐れではなく愛から選んでみて。",
    advice: "自分を大切にすることと、人を大切にすることは、矛盾しません。"
  },
  {
    id: 7, roman: "VII", nameJa: "戦車", nameEn: "THE CHARIOT",
    symbol: "⚡",
    keyword: "前進・意志・克服",
    text: "今日は迷いを脇に置いて、前を向いて進む日です。困難があっても、それはあなたを止めるためではなく、強くするためにあります。スピードよりも「方向」を信じて。",
    advice: "手綱を握るのはあなた自身。感情という馬を御することで、どこへでも行けます。"
  },
  {
    id: 8, roman: "VIII", nameJa: "力", nameEn: "STRENGTH",
    symbol: "🦁",
    keyword: "内なる強さ・優しさ・忍耐",
    text: "今日必要な強さは、声高に叫ぶものではなく、静かで深いもの。怒りや恐れをただ押さえ込むのではなく、優しく受け入れることが、本当の力になります。",
    advice: "あなたはもう十分に強い。その強さを、自分自身へも向けてあげてください。"
  },
  {
    id: 9, roman: "IX", nameJa: "隠者", nameEn: "THE HERMIT",
    symbol: "🏮",
    keyword: "内省・独り時間・探求",
    text: "今日は一人の時間を大切にしてください。賑やかさから少し離れて、自分の内側を丁寧に見つめることで、大切な気づきが訪れます。答えはすでに、あなたの中にあります。",

  {

    text: "物事が動き始めています。今日はその流れに乗ることを意識してください。コントロールしようとし過ぎず、変化を恐れず受け入れることで、思わぬ好機が開きます。",
    advice: "輪は必ず回ります。今どの位置にいても、それは次の場所への途中です。"
  },
  {
    id: 11, roman: "XI", nameJa: "正義", nameEn: "JUSTICE",
    symbol: "⚖️",
    keyword: "公正・誠実・因果",
    text: "今日は正直に、フェアに。誰かのせいにしたくなる気持ちがあるなら、自分の側の責任も静かに見つめてみてください。誠実さが、長い目で見て最善の道になります。",
    advice: "天秤はどちらかを切り捨てません。両方を丁寧に見ることが、真の判断です。"
  },
  {
    id: 12, roman: "XII", nameJa: "吊るされた男", nameEn: "THE HANGED MAN",
    symbol: "🌊",
    keyword: "視点の転換・手放す・待機",
    text: "今日は「逆さまから見る」練習をしてみてください。当たり前だと思っていたことを疑い、違う角度から物事を眺めると、思わぬ発見があります。焦らず、今は待つ時です。",
    advice: "手放すことは、失うことではありません。空いた手に、新しいものが届きます。"
  },
  {
    id: 13, roman: "XIII", nameJa: "死神", nameEn: "DEATH",
    symbol: "🍂",
    keyword: "終わりと始まり・変容・手放し",
    text: "何かが終わろうとしているなら、それを引き止めないでください。終わりは必ず新しい始まりへとつながっています。古いものを手放すことで、本当に必要なものが見えてきます。",
    advice: "秋が葉を落とすのは、春の準備です。あなたにも、そんな季節が来ています。"
  },
  {
    id: 14, roman: "XIV", nameJa: "節制", nameEn: "TEMPERANCE",

let shuffled = false;
let deck = [];

function startShuffle() {
  if (shuffled) {
    goToSpread();
    return;
  }
  const deckVisual = document.getElementById('deckVisual');
  const btn = document.getElementById('shuffleBtn');
  const msg = document.getElementById('shuffledMsg');
  btn.disabled = true;
  deckVisual.classList.add('shuffling');

  setTimeout(() => {
    deckVisual.classList.remove('shuffling');
    shuffled = true;
    deck = [...TAROT].sort(() => Math.random() - 0.5);
    msg.textContent = '✦ シャッフルされました ✦';
    btn.textContent = 'カードを広げる';
    btn.disabled = false;
  }, 1800);
}

function goToSpread() {
  document.getElementById('screen-shuffle').style.display = 'none';
  const spread = document.getElementById('screen-spread');
  spread.style.display = 'block';
  spread.classList.add('fade-in');

  const fan = document.getElementById('cardsFan');
  fan.innerHTML = '';
  deck.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'fan-card';
    el.style.animationDelay = (i * 0.03) + 's';
    el.addEventListener('click', () => selectCard(card, el));
    fan.appendChild(el);
  });
}

function selectCard(card, el) {
  el.classList.add('selected');
  setTimeout(() => showResult(card), 300);
}

function showResult(card) {
  document.getElementById('screen-spread').style.display = 'none';
  const result = document.getElementById('screen-result');
  result.style.display = 'block';
  result.classList.add('fade-in');

  // カード表面を設定
  document.getElementById('resultCardFront').innerHTML = `
    <div class="card-symbol">${card.symbol}</div>
    <div class="card-roman">${card.roman}</div>
    <div class="card-name-ja">${card.nameJa}</div>
    <div class="card-name-en">${card.nameEn}</div>
  `;

  document.getElementById('readingKeyword').textContent = card.keyword;
  document.getElementById('readingText').textContent = card.text;
  document.getElementById('readingAdvice').textContent = card.advice;

  // カードをフリップ
  setTimeout(() => {
    document.getElementById('resultCardInner').classList.add('flipped');
  }, 400);

  // 解説フェードイン
  setTimeout(() => {
    document.getElementById('cardReading').classList.add('visible');
  }, 1200);

  setTimeout(() => {
    document.getElementById('againBtn').classList.add('visible');
  }, 1800);
}

function resetAll() {
  shuffled = false;
  deck = [];
  document.getElementById('screen-result').style.display = 'none';
  document.getElementById('screen-result').classList.remove('fade-in');
  document.getElementById('cardReading').classList.remove('visible');
  document.getElementById('againBtn').classList.remove('visible');
  document.getElementById('resultCardInner').classList.remove('flipped');
  document.getElementById('screen-shuffle').style.display = 'block';
  document.getElementById('shuffleBtn').textContent = 'カードをシャッフルする';
  document.getElementById('shuffleBtn').disabled = false;
  document.getElementById('shuffledMsg').textContent = '';
}
